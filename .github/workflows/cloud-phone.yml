name: Android Cloud Phone

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android Emulator & VNC Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y x11vnc websockify novnc xvfb
        
    - name: Start Android Cloud Phone
      run: |
        echo "ভার্চুয়াল ডিসপ্লে এবং স্ক্রিন সার্ভার চালু করা হচ্ছে..."
        Xvfb :1 -screen 0 720x1280x24 &
        export DISPLAY=:1
        
        x11vnc -display :1 -nopw -listen localhost -forever -shared &
        echo "অ্যান্ড্রোয়েড ক্লাউড ফোন এনভায়রনমেন্ট রেডি!"

    - name: Wait for VNC Server to Boot
      run: |
        echo "VNC এবং ডিসপ্লে সার্ভার পুরোপুরি সচল হওয়ার জন্য ১৫ সেকেন্ড অপেক্ষা করা হচ্ছে..."
        sleep 15

    - name: Authenticate Ngrok
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Connect to Screen (Random Domain)
      run: |
        # Websockify ব্যাকগ্রাউন্ডে চালু করা হচ্ছে
        websockify --web /usr/share/novnc 6080 localhost:5900 &
        
        echo "------------------------------------------------------------"
        echo "👉 আপনার ক্লাউড ফোনের নতুন লিংকটি নিচে তৈরি হচ্ছে..."
        echo "------------------------------------------------------------"
        
        # Ngrok-কে ব্যাকগ্রাউন্ডে সচল রেখে লগ দেখার জন্য কনফিগারেশন
        ngrok http 6080 --log=stdout &
        
        # লিংকটি লগে প্রিন্ট হওয়া এবং কানেকশন সচল রাখার জন্য অপেক্ষা করা
        sleep 10
        curl --silent http://127.0.0.1:4040/api/tunnels | jq '.tunnels[0].public_url'
        
        # সেশনটি সচল রাখার জন্য লুপ (যাতে ওয়ার্কফ্লো বন্ধ না হয়ে যায়)
        echo "কানেকশন সচল আছে। স্ক্রিনটি চালু রাখতে অপেক্ষা করা হচ্ছে..."
        sleep 21600
        
