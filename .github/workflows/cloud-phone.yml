name: Ultimate Rooted Cloud Phone

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq xvfb x11vnc novnc websockify curl
          
          # Ngrok Setup
          curl -fsSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo gpg --dearmor -o /usr/share/keyrings/ngrok.gpg
          echo "deb [signed-by=/usr/share/keyrings/ngrok.gpg] https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install -y ngrok

      - name: Authenticate ngrok
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          ngrok config add-authtoken "$NGROK_TOKEN"

      - name: Setup and Run Rooted Android Emulator
        run: |
          # ১. এভিডি পাথ ট্র্যাকিং ফিক্স করতে ডিরেক্টরি আগে থেকেই তৈরি করা
          mkdir -p ~/.android/avd
          
          # ২. সিস্টেম ইমেজ ডাউনলোড
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "emulator" "platform-tools" "system-images;android-28;google_apis;x86_64"
          
          # ৩. সঠিক পাথে এভিডি তৈরি নিশ্চিত করা
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd -n RootedCloudPhone -k "system-images;android-28;google_apis;x86_64" --force

          # ৪. ভার্চুয়াল ডিসপ্লে ব্যাকগ্রাউন্ডে রেডি করা যেন এমুলেটর প্রথম থেকেই ডিসপ্লে পায়
          Xvfb :0 -screen 0 1280x720x24 &
          sleep 3
          export DISPLAY=:0

          # ৫. এমুলেটর রান করা (Writable System ও সুনির্দিষ্ট পাথ সহ)
          $ANDROID_HOME/emulator/emulator -avd RootedCloudPhone -writable-system -no-audio -no-boot-anim -gpu swiftshader_indirect &
          
          echo "অ্যান্ড্রয়েড বুট হওয়ার জন্য অপেক্ষা করা হচ্ছে..."
          $ANDROID_HOME/platform-tools/adb wait-for-device
          sleep 15
          
          # ৬. এমুলেটরে রুট ফাইল রাইট পারমিশন দেওয়া
          $ANDROID_HOME/platform-tools/adb root
          sleep 2
          $ANDROID_HOME/platform-tools/adb remount
          sleep 2
          
          # ৭. রুট কন্ট্রোল করার জন্য Superuser APK ইনস্টল
          curl -L -o superuser.apk https://github.com/phhusson/Superuser/raw/master/superuser.apk
          $ANDROID_HOME/platform-tools/adb install superuser.apk || true

          # -------------------------------------------------------------
          # 🔒 গেম সার্ভার বা থার্ড-পার্টি অ্যাপ থেকে রুট হাইড করার স্ক্রিপ্ট
          $ANDROID_HOME/platform-tools/adb shell "su 0 pm disable com.google.android.gms/.chimera.GmsIntentOperationService" || true
          $ANDROID_HOME/platform-tools/adb shell "su 0 setenforce 0" || true
          # -------------------------------------------------------------

          # ৮. VNC, Web-screen এবং Ngrok টানেল চালু করা
          x11vnc -display :0 -nopw -forever -shared -rfbport 5900 &
          websockify --web=/usr/share/novnc 6080 localhost:5900 &
          ngrok http 6080 > /dev/null &
          sleep 10

          # ৯. ইউজার লিংক জেনারেট করা
          echo "======================================"
          echo "👉 রুট ও ফিক্সড ডিরেক্টরি সহ ক্লাউড ফোনের লিংক:"
          curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          echo "======================================"
          
          # সেশন চালু রাখার জন্য স্লিপ
          sleep 20000
          
