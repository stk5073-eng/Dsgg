name: Secure Gaming Cloud Phone

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android Emulator and Tunnel
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils webfs jq novnc websockify
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "system-images;android-31;default;x86_64"
        echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    - name: Install Ngrok
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com/ buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install -y ngrok

    - name: Authenticate Ngrok
      env:
        NGROK_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
      run: ngrok config add-authtoken "$NGROK_TOKEN"

    - name: Start Android Emulator (No Crash Mode)
      run: |
        echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd -n CloudPhone -k "system-images;android-31;default;x86_64" --force
        # সরাসরি পোর্টের মাধ্যমে ব্রাউজারে কানেক্ট করার জন্য -vnc :0 অপশন যোগ করা হয়েছে
        $ANDROID_HOME/emulator/emulator -avd CloudPhone -no-window -no-audio -no-boot-anim -no-snapshot -gpu swiftshader_indirect -vnc :0 &

    - name: Web Screen Connection
      run: |
        # সরাসরি অ্যান্ড্রয়েডের ইন্টারনাল স্ক্রিন পোর্টটিকে (5900) ব্রাউজারের পোর্টে (6080) পাঠানো হচ্ছে
        websockify --web /usr/share/novnc 6080 localhost:5900 &
        ngrok http 6080 --log=stdout > /dev/null &
        sleep 30
        echo "============================================="
        echo "👉 আপনার ক্লাউড ফোনের নতুন লিংক নিচে দেওয়া হলো:"
        curl --silent http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url'
        echo "============================================="
        sleep 20000
        
