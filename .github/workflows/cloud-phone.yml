name: Ultimate Gaming Cloud Phone

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            jq \
            xvfb \
            x11vnc \
            novnc \
            websockify \
            curl

          curl -fsSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | \
            sudo gpg --dearmor -o /usr/share/keyrings/ngrok.gpg

          echo "deb [signed-by=/usr/share/keyrings/ngrok.gpg] https://ngrok-agent.s3.amazonaws.com buster main" | \
            sudo tee /etc/apt/sources.list.d/ngrok.list

          sudo apt-get update
          sudo apt-get install -y ngrok

      - name: Authenticate ngrok
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          ngrok config add-authtoken "$NGROK_TOKEN"

      - name: Start Virtual Display
        run: |
          Xvfb :0 -screen 0 1280x720x24 &
          export DISPLAY=:0
          x11vnc -display :0 -nopw -forever -shared -rfbport 5900 &
          websockify --web=/usr/share/novnc 6080 localhost:5900 &
          ngrok http 6080 > /dev/null &
          sleep 10

      - name: Run Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 5X
          force-avd-creation: true
          emulator-options: -no-audio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          script: |
            echo "======================================"
            echo "Cloud Phone URL:"
            curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url'
            echo "======================================"
            sleep 20000
