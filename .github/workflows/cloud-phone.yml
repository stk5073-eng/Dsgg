name: Ultimate Gaming Cloud Phone

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq xvfb x11vnc novnc websockify curl
          
          # Ngrok ইন্সটলেশন
          curl -fsSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo gpg --dearmor -o /usr/share/keyrings/ngrok.gpg
          echo "deb [signed-by=/usr/share/keyrings/ngrok.gpg] https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install -y ngrok

      - name: Authenticate ngrok
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          ngrok config add-authtoken "$NGROK_TOKEN"

      - name: Setup and Run Android Emulator with Display
        run: |
          # ১. অ্যান্ড্রয়েড এসডিকে থেকে লাইটওয়েট ইমেজ এবং এমুলেটর প্যাকেজ নিশ্চিত করা
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "emulator" "platform-tools" "system-images;android-28;default;x86_64"
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd -n CloudPhone -k "system-images;android-28;default;x86_64" --force

          # ২. ভার্চুয়াল ডিসপ্লে ব্যাকগ্রাউন্ডে স্টার্ট করা
          Xvfb :0 -screen 0 1280x720x24 &
          sleep 3
          export DISPLAY=:0

          # ৩. এমুলেটরকে সরাসরি এই ডিসপ্লে জোনে ব্যাকগ্রাউন্ডে রান করা
          $ANDROID_HOME/emulator/emulator -avd CloudPhone -no-audio -no-boot-anim -gpu swiftshader_indirect &
          sleep 10

          # ৪. VNC, Web-screen এবং Ngrok টানেল চালু করা
          x11vnc -display :0 -nopw -forever -shared -rfbport 5900 &
          websockify --web=/usr/share/novnc 6080 localhost:5900 &
          ngrok http 6080 > /dev/null &
          sleep 15

          # ৫. ইউজার লিংক জেনারেট করা
          echo "======================================"
          echo "👉 আপনার ক্লাউড ফোনের লিংক নিচে দেওয়া হলো:"
          curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          echo "======================================"
          
          # সেশন চালু রাখার জন্য স্লিপ
          sleep 20000
          
