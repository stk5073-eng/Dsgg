name: Android Cloud Phone

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android Emulator & VNC Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y x11vnc websockify novnc
        # এখানে আপনার ক্লাউড ফোনের প্রয়োজনীয় অন্যান্য টুলস ইন্সটল করার কমান্ড থাকবে

    - name: Start Android Cloud Phone
      run: |
        # আপনার অ্যান্ড্রোয়েড স্ক্রিন/সার্ভার স্টার্ট করার মূল কমান্ডটি এখানে দিন
        # উদাহরণস্বরূপ (ব্যাকগ্রাউন্ডে সচল রাখার জন্য '&' ব্যবহার নিশ্চিত করুন):
        echo "Starting Cloud Phone..." 
        # (এখানে আপনার আসল অ্যান্ড্রোয়েড স্ক্রিপ্টটি বসবে)

    - name: Wait for VNC Server to Boot
      run: |
        echo "VNC এবং ডিসপ্লে সার্ভার চালু হওয়ার জন্য ১৫ সেকেন্ড অপেক্ষা করা হচ্ছে..."
        sleep 15

    - name: Authenticate Ngrok
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.di/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Connect to Screen (Random Domain)
      run: |
        # Websockify ব্যাকগ্রাউন্ডে চালু করা হচ্ছে
        websockify --web /usr/share/novnc 6080 localhost:5900 &
        
        echo "------------------------------------------------------------"
        echo "👉 আপনার ক্লাউড ফোনের নতুন লিংকটি নিচে তৈরি হচ্ছে..."
        echo "------------------------------------------------------------"
        
        # ডোমেন এরর এড়াতে প্রতিবার নতুন র্যান্ডম ডোমেনে টানেল চালু করা হচ্ছে
        ngrok http 6080 --log=stdout
        
